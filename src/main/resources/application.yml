server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: yunmu-shopping
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shopping?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: ShoppingHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.yunmu.shopping.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  openapi:
    title: 云亩商城API文档
    description: 全平台分销商城系统API接口文档
    version: 1.0.0
    concat: yunmu
    group:
      default:
        group-name: 默认分组
        api-rule: package
        api-rule-resources:
          - com.yunmu.shopping.controller

jwt:
  secret: yunmu-shopping-secret-key-2024-very-long-secret-key-for-jwt-token-generation
  expiration: 86400000
  header: Authorization
  prefix: Bearer

file:
  upload:
    path: ./uploads
    url-prefix: /uploads

logging:
  level:
    com.yunmu.shopping: debug
    org.springframework.security: info
